<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css">
    <title>Contato</title>

    <!--STYLES-->
    <script src="/javascript/menu-navegacao.js" defer></script>
    <script src="/javascript/footer.js" defer></script>
    <script src="/javascript/card-cursos.js" defer></script>

    <!--FONTES-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Jacques+Francois&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jacques+Francois&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloock&family=Jacques+Francois&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Gloock&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jacques+Francois&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<header class="fixed-top">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <nav>
        <menu-navegacao></menu-navegacao>
    </nav>
</header>

<body>
    <div style="position: relative;">
        <img src="/img/doces-rosa.jpg" alt="" style="width: 100%; height: 300px; opacity: 0.4; object-fit: cover;">

        <div class="container col-md-4" style=" font-family: Gloock, serif; color: #661647; text-align: right; padding-top: 60px; top: 30%; right: 100px; position: absolute;">
            <h1 style="font-size: 60px;">CONTATO</h1>
        </div>
    </div>

    <aside>
        <div class="container py-5">
            <div class="row">

                <div class="col-md-6" style="text-align: left; margin-left: auto;">
                    <h4 class="titulos mb-4" style="font-family: 'Inter', sans-serif; color:#8F2738; padding-left: 70px;">
                        Informações de contato
                    </h4>

                    <ul style="list-style: none; padding: 0; margin: 0; align-items: flex-start; padding-left: 100px;">
                        <li class="localizacao" style="margin-top: 15px">R. João Manoel, 460</li>
                        <li class="localizacao">São Francisco, </li>
                        <li class="localizacao">Curitiba - PR, 80510-250</li>
                        <li class="localizacao" style="margin-top: 10px;">Whatsapp: (41) 98888-9595</li>
                    </ul>

                    <div class="py-4" style="text-align: left;">
                        <h3 class="titulos mt-5" style="font-family: 'Inter', sans-serif; color:#8F2738; padding-left: 70px;">
                            Nossas redes sociais
                        </h3>

                        <div style="padding-left: 100px;">
                            <i class="fa-brands fa-facebook-f" style="color: #F0C260; padding: 10px;">
                            </i>
                            <a class="redes-sociais" href="" style="padding: 10px;">Facebook</a>

                            <br>
                            <i class="fa-brands fa-x-twitter" style="color: #F0C260; padding: 10px;">
                            </i>
                            <a class="redes-sociais" href="" style="padding: 10px;">Antigo Twitter</a>
                            <br>
                            <i class="fa-brands fa-youtube" style="color: #F0C260; padding: 10px;">
                            </i>
                            <a class="redes-sociais" href="" style="padding: 10px; display: inline;">Youtube</a>
                            <br>
                            <i class="fa-brands fa-whatsapp" style="color: #F0C260; padding: 10px;">
                            </i>
                            <a class="redes-sociais" href="" style="padding: 10px; display: inline;">WhatsApp</a>
                            <br>
                            <i class="fa-brands fa-linkedin-in" style="color: #F0C260; padding: 10px;">
                            </i>
                            <a class="redes-sociais" href="" style="padding: 10px; display: inline;">Linkedin</a>

                        </div>

                        <div style="padding-left: 70px;">
                            <h3 class="titulo mt-5" style="font-weight: 700; font-family: 'Inter', sans-serif; color:#8F2738;">
                                Localização
                            </h3>

                            <div class="mapa mp-3 py-4">
                                <iframe width="90%" height="250" src="https://www.openstreetmap.org/export/embed.html?bbox=-49.27673667669296%2C-25.423196447159018%2C-49.27422612905503%2C-25.421629100118288&amp;layer=mapnik" style="border: 0" allowfullscreen></iframe>
                                <br/>
                                <small>
                                    <a href="https://www.openstreetmap.org/?#map=19/-25.422413/-49.275481"></a>
                                </small>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <p class="text-muted" style="font-family: 'Inter', sans-serif;">
                        Ficou com alguma dúvida?
                    </p>

                    <h2 class="titulo mb-4" style="font-weight: 700; font-family: 'Inter', sans-serif; color:#000000; padding-top: 40px;">
                        Preencha o formulário e <span style="color: #8F2738;">fale conosco</span>
                    </h2>

                    <div class="card-form">
                        <form>
                            <div class="row mb-3">
                                <div class="form-group col">
                                    <label for="inputNome">Nome</label>
                                    <input type="text" class="form-control" id="inputNome" placeholder="Nome">
                                </div>

                                <div class="form-group col">
                                    <label for="inputSobrenome">Sobrenome</label>
                                    <input type="text" class="form-control" id="inputSobrenome" placeholder="Sobrenome">
                                </div>
                            </div>

                            <div class="form-group mb-3">
                                <label for="inputEmail">E-mail</label>
                                <input type="email" class="form-control" id="inputEmail" placeholder="E-mail">
                            </div>

                            <div class="form-group mb-3">
                                <label for="inputAddress2">Telefone (com DDD)</label>
                                <input type="number" class="form-control" id="inputTelefone" placeholder="Telefone">
                            </div>

                            <div class="form-row mb-3">
                                <label for="inputAssunto">Assunto</label>
                                <input type="text" class="form-control" id="inputAssunto" placeholder="Assunto">
                            </div>

                            <div class="form-group mb-3">
                                <label for="inputMensagem">Mensagem</label>
                                <textarea class="form-control" id="inputMensagem" rows="8" placeholder="Mensagem"></textarea>
                            </div>

                            <button type="submit" class="btn w-100 mt-4" style="background-color: #F0C260;">
                                Enviar
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </aside>

    <div class="col-md-4 m-auto" style=""></div>

    <footer>
        <ins-footer></ins-footer>
    </footer>
</body>
</html>
